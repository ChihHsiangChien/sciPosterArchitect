<svg width="595" height="842" viewBox="0 0 595 842" xmlns="http://www.w3.org/2000/svg">
<rect width="595" height="842" fill="#FFF5F5"/>
<rect width="595" height="110" fill="#B71C1C"/>
<text x="35" y="45" font-family="sans-serif" font-size="10" fill="#fff" opacity="0.8">中華民國第二百屆中小學科學展覽會 | 應用科學科</text>
<text x="35" y="80" font-family="serif" font-size="24" fill="#fff" font-weight="bold">智慧城市架構下之自動化廢棄物分類系統優化研究</text>
<g transform="translate(35, 140)"><rect width="175" height="130" fill="#FFFFFF" stroke="#ddd"/><path d="M 0,0 H 58.333333333333336" stroke="#B71C1C" stroke-width="10"/><text x="10" y="30" font-size="15" fill="#440000" font-weight="bold">摘要</text><text x="10" y="45" font-family="sans-serif" font-size="11" fill="#4A5568" text-anchor="start"><tspan x="10" dy="0">本研究開發高精度辨識模組</tspan><tspan x="10" dy="17.6">，傳統體系誤判高、效率低</tspan><tspan x="10" dy="17.6">。我們於嵌入式平台實現微</tspan><tspan x="10" dy="17.6">秒級決策。經 5 萬組樣</tspan><tspan x="10" dy="17.6">本驗證，誤判率降至 2.</tspan><tspan x="10" dy="17.6">4% 以下。</tspan></text></g>
<g transform="translate(35, 290)"><rect width="175" height="310" fill="#FFFFFF" stroke="#ddd"/><path d="M 0,0 H 58.333333333333336" stroke="#B71C1C" stroke-width="10"/><text x="10" y="30" font-size="15" fill="#440000" font-weight="bold">研究動機</text><text x="10" y="45" font-family="sans-serif" font-size="11" fill="#4A5568" text-anchor="start"><tspan x="10" dy="0">廢棄物管理為永續展之關鍵</tspan><tspan x="10" dy="17.6">，現今技術處理形變金屬與</tspan><tspan x="10" dy="17.6">素材仍有瓶頸。將 AI </tspan><tspan x="10" dy="17.6">部署於端點，配合物理補償</tspan><tspan x="10" dy="17.6">，能大幅提升效率。</tspan></text></g>
<g transform="translate(230, 140)"><rect width="335" height="250" fill="#FFFFFF" stroke="#ddd"/><path d="M 0,0 H 111.66666666666667" stroke="#B71C1C" stroke-width="10"/><text x="10" y="30" font-size="15" fill="#440000" font-weight="bold">研究流程與方法</text><text x="10" y="45" font-family="sans-serif" font-size="11" fill="#4A5568" text-anchor="start"><tspan x="10" dy="0">1. 構建低功耗分辨模型。 2. 研發動態感知爪。 </tspan><tspan x="10" dy="17.6">3. 量化運行穩定性。目標達成 60 FPS 以上處</tspan><tspan x="10" dy="17.6">理效率。</tspan></text></g>
<g transform="translate(230, 420)"><rect width="335" height="380" fill="#FFFFFF" stroke="#ddd"/><path d="M 0,0 H 111.66666666666667" stroke="#B71C1C" stroke-width="10"/><text x="10" y="30" font-size="15" fill="#440000" font-weight="bold">結果分析報告</text><text x="10" y="45" font-family="sans-serif" font-size="11" fill="#4A5568" text-anchor="start"><tspan x="10" dy="0">抓取成功率 94.8%，處理通量提升 45%，數據顯</tspan><tspan x="10" dy="17.6">示座標誤差精確收斂於 ±0.02 範圍。顯著性檢定 </tspan><tspan x="10" dy="17.6">(p &lt; 0.001)。</tspan></text></g>
<line x1="35" y1="810" x2="560" y2="810" stroke="#B71C1C" stroke-width="0.5" opacity="0.3"/>
<text x="35" y="825" font-family="sans-serif" font-size="8" fill="#666">[1] Machine Vision 2025 / [2] Robotics / [3] AI Tech Review.</text>
<defs>
<filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
<pattern id="dotGrid" width="10" height="10" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#ddd"/></pattern>
<linearGradient id="gradHead" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#B71C1C"/><stop offset="100%" style="stop-color:#00B0FF"/></linearGradient>
</defs></svg>