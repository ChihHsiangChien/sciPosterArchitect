<svg width="595" height="842" viewBox="0 0 595 842" xmlns="http://www.w3.org/2000/svg">
<rect width="595" height="842" fill="#fafafa"/>
<rect width="595" height="110" fill="#01579B"/>
<text x="35" y="45" font-family="sans-serif" font-size="10" fill="#fff" opacity="0.8">中華民國第二百屆中小學科學展覽會 | 應用科學科 | STYLE-14</text>
<text x="35" y="80" font-family="serif" font-size="24" fill="#fff" font-weight="bold">智慧城市架構下之自動化廢棄物分類系統優化研究</text>
<g transform="translate(35, 140)"><rect width="175" height="130" fill="#fff" fill-opacity="0.8" stroke="#fff" stroke-width="1" rx="12" filter="url(#shadow)"/><text x="15" y="24" font-size="13" fill="#01579B" font-weight="bold">摘要</text><text x="12" y="50" font-family="sans-serif" font-size="10.5" fill="#333" text-anchor="start"><tspan x="12" dy="0">請查看此摘要區塊之佈局壓力</tspan><tspan x="12" dy="16.8">與自動分行效果表現，此處填</tspan><tspan x="12" dy="16.8">入高密度科研文字，以便測試</tspan><tspan x="12" dy="16.8">。此技術完全兼容於 Ink</tspan><tspan x="12" dy="16.8">scape。</tspan></text></g>
<g transform="translate(35, 290)"><rect width="175" height="310" fill="#fff" fill-opacity="0.8" stroke="#fff" stroke-width="1" rx="12" filter="url(#shadow)"/><text x="15" y="24" font-size="13" fill="#01579B" font-weight="bold">研究動機</text><text x="12" y="50" font-family="sans-serif" font-size="10.5" fill="#333" text-anchor="start"><tspan x="12" dy="0">廢棄物管理為永續展之關鍵，</tspan><tspan x="12" dy="16.8">現今技術處理形變金屬與素材</tspan><tspan x="12" dy="16.8">。我們於端點實現微秒級決策</tspan><tspan x="12" dy="16.8">。經 5 萬組樣本驗證，誤</tspan><tspan x="12" dy="16.8">判率降至 2.4% 以下。</tspan></text></g>
<g transform="translate(230, 140)"><rect width="335" height="250" fill="#fff" fill-opacity="0.8" stroke="#fff" stroke-width="1" rx="12" filter="url(#shadow)"/><text x="15" y="24" font-size="13" fill="#01579B" font-weight="bold">研究流程與方法</text><text x="12" y="50" font-family="sans-serif" font-size="10.5" fill="#333" text-anchor="start"><tspan x="12" dy="0">1. 構建低功耗分辨模型。 2. 研發動態感知爪。 3.</tspan><tspan x="12" dy="16.8"> 量化運行穩定性。目標達成 60 FPS 以上處理效率。</tspan></text></g>
<g transform="translate(230, 420)"><rect width="335" height="380" fill="#fff" fill-opacity="0.8" stroke="#fff" stroke-width="1" rx="12" filter="url(#shadow)"/><text x="15" y="24" font-size="13" fill="#01579B" font-weight="bold">結果分析報告</text><text x="12" y="50" font-family="sans-serif" font-size="10.5" fill="#333" text-anchor="start"><tspan x="12" dy="0">抓取成功率 94.8%，處理通量提升 45%，數據顯示座</tspan><tspan x="12" dy="16.8">標誤差精確收斂於 ±0.02 範圍。顯著性檢定 (p &lt;</tspan><tspan x="12" dy="16.8"> 0.001)。</tspan></text></g>
<defs><filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter><pattern id="dotGrid" width="10" height="10" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#ddd"/></pattern><linearGradient id="gradHead" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#01579B"/><stop offset="100%" style="stop-color:#00B0FF"/></linearGradient></defs></svg>