    <rect id="board_top_frame" x="660" y="-210" width="750" height="200" />
    
    <!-- Page 3: Right (650x1200) -->
    <rect id="board_right_frame" x="1420" y="0" width="650" height="1200" />
  </g>

  <!-- Content Injection Marker Layer -->
  <g inkscape:groupmode="layer" inkscape:label="Content Layer" id="layer_content"><defs><linearGradient id="gradHead" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#4A148C"/><stop offset="100%" style="stop-color:#7B1FA2"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter></defs><g transform="translate(660, -210)" id="panel_top"><rect width="750" height="200" fill="#FAFAFF" rx="5"/><rect width="750" height="18" fill="url(#gradHead)" rx="5"/><text x="25" y="60" font-family="sans-serif" font-size="20" fill="#21004A" font-weight="bold">中華民國第二百屆中小學科學展覽會 | 應用科學科</text><text x="725" y="60" font-family="sans-serif" font-size="22" fill="#21004A" text-anchor="end" font-weight="bold">編號：080215-M001 | 單位：國立中學</text><text x="375.0" y="115" font-family="serif" font-size="85" fill="#21004A" font-weight="bold" text-anchor="middle">智慧城市架構下之自動化廢</text><text x="375.0" y="175" font-family="serif" font-size="75" fill="#21004A" font-weight="bold" text-anchor="middle">棄物分類系統優化研究</text></g><g transform="translate(0, 0)"><rect width="650" height="1200" fill="#FAFAFF"/><g transform="translate(40, 40)"><g transform="translate(0, 0)"><rect width="570" height="220" fill="#FFFFFF" rx="10" stroke="#ccc"/><rect width="570" height="50" fill="url(#gradHead)" rx="10"/><text x="20" y="35" font-size="24" fill="#fff" font-weight="bold">摘要 (Abstract)</text><text x="20" y="70" font-family="sans-serif" font-size="15" fill="#2D3748" text-anchor="start"><tspan x="20" dy="0">本研究開發高精度辨識模組，傳統體系誤判高、效率低。我們於嵌入式平</tspan><tspan x="20" dy="21.0">台實現微秒級決策。經 5 萬組樣本驗證，誤判率降至 2.4% 以</tspan><tspan x="20" dy="21.0">下。</tspan></text></g><g transform="translate(0, 260)"><rect width="570" height="400" fill="#FFFFFF" rx="10" stroke="#ccc"/><rect width="570" height="50" fill="url(#gradHead)" rx="10"/><text x="20" y="35" font-size="24" fill="#fff" font-weight="bold">研究動機</text><text x="20" y="70" font-family="sans-serif" font-size="15" fill="#2D3748" text-anchor="start"><tspan x="20" dy="0">廢棄物管理為永續展之關鍵，現今技術處理形變金屬與素材仍有瓶頸。將</tspan><tspan x="20" dy="21.0"> AI 部署於端點，配合物理補償，能大幅提升效率。</tspan></text></g><g transform="translate(0, 700)"><rect width="570" height="420" fill="#FFFFFF" rx="10" stroke="#ccc"/><rect width="570" height="50" fill="url(#gradHead)" rx="10"/><text x="20" y="35" font-size="24" fill="#fff" font-weight="bold">研究目的與展望</text><text x="20" y="70" font-family="sans-serif" font-size="15" fill="#2D3748" text-anchor="start"><tspan x="20" dy="0">1. 構建低功耗分辨模型。 2. 研發動態感知爪。 3. 量化運</tspan><tspan x="20" dy="21.0">行穩定性。目標達成 60 FPS 以上處理效率。</tspan></text></g></g></g><g transform="translate(660, 0)"><rect width="750" height="1200" fill="#FAFAFF"/><g transform="translate(40, 40)"><g transform="translate(0, 0)"><rect width="670" height="600" fill="#FFFFFF" rx="10" stroke="#ccc"/><rect width="670" height="50" fill="url(#gradHead)" rx="10"/><text x="20" y="35" font-size="24" fill="#fff" font-weight="bold">研究方法與系統流程</text><text x="20" y="70" font-family="sans-serif" font-size="15" fill="#2D3748" text-anchor="start"><tspan x="20" dy="0">這裡放置實驗設計圖示與模型細節。</tspan><tspan x="20" dy="21.0"></tspan><tspan x="20" dy="21.0">1. 構建低功耗分辨模型。 2. 研發動態感知爪。 3. 量化運行穩定性。目</tspan><tspan x="20" dy="21.0">標達成 60 FPS 以上處理效率。</tspan></text></g><g transform="translate(0, 650)"><rect width="670" height="480" fill="#FFFFFF" rx="10" stroke="#ccc"/><rect width="670" height="50" fill="url(#gradHead)" rx="10"/><text x="20" y="35" font-size="24" fill="#fff" font-weight="bold">數據結果與量化分析</text><text x="20" y="70" font-family="sans-serif" font-size="15" fill="#2D3748" text-anchor="start"><tspan x="20" dy="0">抓取成功率 94.8%，處理通量提升 45%，數據顯示座標誤差精確收斂於 ±</tspan><tspan x="20" dy="21.0">0.02 範圍。顯著性檢定 (p &lt; 0.001)。</tspan></text></g></g></g><g transform="translate(1420, 0)"><rect width="650" height="1200" fill="#FAFAFF"/><g transform="translate(40, 40)"><g transform="translate(0, 0)"><rect width="570" height="500" fill="#FFFFFF" rx="10" stroke="#ccc"/><rect width="570" height="50" fill="url(#gradHead)" rx="10"/><text x="20" y="35" font-size="24" fill="#fff" font-weight="bold">綜合討論與分析</text><text x="20" y="70" font-family="sans-serif" font-size="15" fill="#2D3748" text-anchor="start"><tspan x="20" dy="0">抓取成功率 94.8%，處理通量提升 45%，數據顯示座標誤差精</tspan><tspan x="20" dy="21.0">確收斂於 ±0.02 範圍。顯著性檢定 (p &lt; 0.001)。</tspan></text></g><g transform="translate(0, 540)"><rect width="570" height="340" fill="#FFFFFF" rx="10" stroke="#ccc"/><rect width="570" height="50" fill="url(#gradHead)" rx="10"/><text x="20" y="35" font-size="24" fill="#fff" font-weight="bold">研究結論</text><text x="20" y="70" font-family="sans-serif" font-size="15" fill="#2D3748" text-anchor="start"><tspan x="20" dy="0">本研究成功優化了偵測效率並顯著降低運算能耗。</tspan></text></g><g transform="translate(0, 920)"><rect width="570" height="180" fill="#FFFFFF" rx="10" stroke="#ccc"/><rect width="570" height="50" fill="url(#gradHead)" rx="10"/><text x="20" y="35" font-size="24" fill="#fff" font-weight="bold">參考文獻</text><text x="20" y="70" font-family="sans-serif" font-size="15" fill="#2D3748" text-anchor="start"><tspan x="20" dy="0">[1] Machine Vision 2025 / [2] Ro</tspan><tspan x="20" dy="21.0">botics / [3] AI Tech Review.</tspan></text></g></g></g>
    <!-- Generated content will be injected here -->
  </g>
</svg>
